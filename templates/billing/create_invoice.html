{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">
        <h4>Create Invoice</h4>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label>Customer</label>
            
                <select
                    name="customer"
                    class="form-select">
                    <option value="" selected disabled>
        Select Customer name
    </option>
                    {% for customer in customers %}

                    <option value="{{ customer.id }}">
                        {{ customer.name }}
                    </option>

                    {% endfor %}

                </select>
            </div>

            <div class="mb-3">
                <label>Product</label>

                <select
                    name="product"
                    class="form-select">
                    <option value="" selected disabled>
        Select Customer
    </option>
                    {% for product in products %}
                    
                    <option value="{{ product.id }}">
                        {{ product.name }}
                        (₹{{ product.price }})
                    </option>

                    {% endfor %}

                </select>
            </div>

            <div class="mb-3">

                <label>Quantity</label>

                <input
                    type="number"
                    name="quantity"
                    class="form-control"
                    required placeholder="Enter Quantity.">

            </div>

            <button
                type="submit"
                class="btn btn-success">

                Generate Invoice

            </button>

        </form>

    </div>

</div>

{% endblock %}
