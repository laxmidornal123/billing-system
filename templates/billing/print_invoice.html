<!DOCTYPE html>
<html>

<head>

<title>Invoice</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body onload="window.print()">

<div class="container mt-5">

    <div class="card">

        <div class="card-header bg-primary text-white">

            <h2>Billing Pro</h2>

        </div>

        <div class="card-body">

            <h4>Invoice</h4>

            <hr>

            <p>
                <strong>Invoice No:</strong>
                {{ invoice.invoice_no }}
            </p>

            <p>
                <strong>Customer:</strong>
                {{ invoice.customer.name }}
            </p>

            <p>
                <strong>Date:</strong>
                {{ invoice.created_at }}
            </p>

            <hr>

            <table class="table table-bordered">

                <tr>
                    <th>Subtotal</th>
                    <td>₹{{ invoice.subtotal }}</td>
                </tr>

                <tr>
                    <th>GST</th>
                    <td>₹{{ invoice.gst }}</td>
                </tr>

                <tr>
                    <th>Total</th>
                    <td>
                        <strong>
                            ₹{{ invoice.total }}
                        </strong>
                    </td>
                </tr>

            </table>

        </div>

    </div>

</div>

</body>

</html>
